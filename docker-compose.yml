services:
  backend:
    build:
      context: .
      dockerfile: packages/back/Dockerfile
    container_name: vengadores-backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    restart: unless-stopped
    networks:
      - vengadores-network

  frontend:
    build:
      context: .
      dockerfile: packages/front/Dockerfile
    container_name: vengadores-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - vengadores-network

networks:
  vengadores-network:
    driver: bridge
